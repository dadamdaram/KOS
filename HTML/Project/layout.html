<!-- id 선택자 이용 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #header {
        background-color: blue;
        height: 100px;
        text-align: center;
      }
      #nav {
        background-color: aqua;
        height: 100px;
        padding: 20px;
        text-align: center;
        float: left;
      }
      #section {
        background-color: blanchedalmond;
        height: 100px;
        text-align: center;
        float: left;
      }
      #footer {
        background-color: azure;
        padding: 20px;

        height: 100px;
        text-align: center;
        clear: both;
      }
    </style>
  </head>
  <body>
    <h1>div 이용 layout</h1>
    <div id="header">
      <h1>header</h1>
    </div>
    <div id="nav">
      <h1>navigation</h1>
    </div>
    <div id="section">
      <h1>section</h1>
    </div>
    <div id="footer">
      <h1>Footer</h1>
    </div>
  </body>
</html>
