<!--  semantic tag -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      header {
        background-color: blue;
        height: 100px;
        text-align: center;
      }
      nav {
        background-color: aqua;
        height: 100px;
        padding: 20px;
        text-align: center;
        float: left;
      }
      section {
        background-color: blanchedalmond;
        height: 100px;
        text-align: center;
        float: left;
      }
      footer {
        background-color: azure;
        padding: 20px;

        height: 100px;
        text-align: center;
        clear: both;
      }
    </style>
  </head>
  <body>
    <h1>div 이용 layout</h1>
    <header>
      <h1>header</h1>
    </header>
    <nav>
      <h1>navigation</h1>
    </nav>
    <section>
      <h1>section</h1>
    </section>
    <footer>
      <h1>Footer</h1>
    </footer>
  </body>
</html>
